---
# =============================================================================
# GRC Hyper-V Lab – Member Server Role
# Joins the server to the domain and applies server baseline config.
# Role-specific tasks (file server, IIS) are in member-servers.yml playbook.
# =============================================================================

# ─── Pre-join checks ───────────────────────────────────────────────────────────
- name: Check current domain membership
  ansible.windows.win_powershell:
    script: |
      $cs = Get-WmiObject Win32_ComputerSystem
      Write-Output "PartOfDomain=$($cs.PartOfDomain)"
      Write-Output "Domain=$($cs.Domain)"
  register: domain_status

- name: Set domain_joined fact
  ansible.builtin.set_fact:
    already_domain_joined: "{{ 'PartOfDomain=True' in domain_status.output | join('') }}"


# ─── DNS – must point at DC before join ────────────────────────────────────────
- name: Confirm DNS points at DC-PRIMARY
  ansible.windows.win_powershell:
    script: |
      $adapters = Get-NetAdapter | Where-Object { $_.Status -eq 'Up' }
      foreach ($a in $adapters) {
        $dns = (Get-DnsClientServerAddress -InterfaceIndex $a.ifIndex -AddressFamily IPv4).ServerAddresses
        Write-Output "$($a.Name): DNS=$($dns -join ', ')"
      }
  register: dns_check

- name: Show current DNS config
  debug:
    var: dns_check.output

- name: Resolve domain FQDN to verify DNS works
  ansible.windows.win_powershell:
    script: |
      try {
        $result = Resolve-DnsName "{{ domain_name }}" -ErrorAction Stop
        Write-Output "DNS OK: {{ domain_name }} resolves to $($result.IPAddress)"
      } catch {
        Write-Warning "DNS FAILED: Cannot resolve {{ domain_name }} – check DC is up and DNS is set correctly."
      }
  register: dns_resolve
  retries: 5
  delay: 15
  until: "'DNS OK' in dns_resolve.output | join('')"

- name: Show DNS resolution result
  debug:
    var: dns_resolve.output


# ─── Domain join ───────────────────────────────────────────────────────────────
- name: Join member server to domain
  microsoft.ad.membership:
    dns_domain_name:       "{{ domain_name }}"
    domain_admin_user:     "{{ domain_netbios }}\\{{ domain_admin_user }}"
    domain_admin_password: "{{ domain_admin_pass }}"
    ou_path:               "{{ ou_servers }}"
    state:                 domain
    reboot:                yes
  when: not already_domain_joined
  register: domain_join_result

- name: Wait for server to come back after domain-join reboot
  ansible.builtin.wait_for:
    host: "{{ ansible_host }}"
    port: 5985
    delay: 30
    timeout: 300
  delegate_to: localhost
  when:
    - not already_domain_joined
    - domain_join_result.changed

- name: Verify domain join was successful
  ansible.windows.win_powershell:
    script: |
      $cs = Get-WmiObject Win32_ComputerSystem
      if ($cs.PartOfDomain -and $cs.Domain -eq "{{ domain_name }}") {
        Write-Output "DOMAIN JOIN OK: $($cs.Name) is a member of $($cs.Domain)"
      } else {
        Write-Warning "DOMAIN JOIN FAILED or pending reboot: Domain=$($cs.Domain), PartOfDomain=$($cs.PartOfDomain)"
      }
  register: join_verify
  retries: 3
  delay: 20

- name: Show join verification
  debug:
    var: join_verify.output


# ─── Post-join baseline ────────────────────────────────────────────────────────
- name: Add domain groups to local Administrators on servers
  ansible.windows.win_group_membership:
    name: Administrators
    members:
      - "{{ domain_netbios }}\\GRC-Server-Admins"
      - "{{ domain_netbios }}\\GRC-AD-Operators"
    state: present
  ignore_errors: yes

- name: Add domain helpdesk to Remote Desktop Users on servers
  ansible.windows.win_group_membership:
    name: "Remote Desktop Users"
    members:
      - "{{ domain_netbios }}\\GRC-Helpdesk"
      - "{{ domain_netbios }}\\GRC-Server-Admins"
    state: present
  ignore_errors: yes

- name: Configure Windows Firewall – allow domain profile traffic
  ansible.windows.win_powershell:
    script: |
      Set-NetFirewallProfile -Profile Domain -Enabled True
      Set-NetFirewallProfile -Profile Private -Enabled True
      Set-NetFirewallProfile -Profile Public  -Enabled True
      Write-Output "Firewall profiles enabled."

- name: Enable and start Windows Event Log service
  ansible.windows.win_service:
    name: EventLog
    state: started
    start_mode: auto

- name: Enable and start Windows Time service
  ansible.windows.win_service:
    name: W32Time
    state: started
    start_mode: auto

- name: Install Windows Server common management features
  ansible.windows.win_feature:
    name:
      - RSAT-AD-PowerShell
      - RSAT-DNS-Server
      - RSAT-GPMC
      - Telnet-Client
      - SNMP-Service
    include_management_tools: yes
    state: present
  ignore_errors: yes

- name: Create local IT admin account as a safety net
  ansible.windows.win_user:
    name: localitadmin
    password: "{{ local_admin_pass | default('L0calAdm!n2024') }}"
    state: present
    groups:
      - Administrators
    description: "Local IT admin account – break-glass"
    password_never_expires: yes
  ignore_errors: yes


# ─── WinRM HTTPS check (MC-008 finding location) ─────────────────────────────
- name: Check WinRM HTTPS listener status
  ansible.windows.win_powershell:
    script: |
      $listeners = Get-ChildItem WSMan:\localhost\Listener
      $https = $listeners | Where-Object { $_.Keys -match 'Transport=HTTPS' }
      $http  = $listeners | Where-Object { $_.Keys -match 'Transport=HTTP' }
      Write-Output "HTTP listener:  $($http -ne $null)"
      Write-Output "HTTPS listener: $($https -ne $null)"
      if (-not $https) {
        Write-Output "FINDING: MC-008 – WinRM HTTPS listener not configured on $env:COMPUTERNAME"
      }
  register: winrm_check

- name: Show WinRM listener status
  debug:
    var: winrm_check.output


# ─── Final status report ───────────────────────────────────────────────────────
- name: Member server role complete – show summary
  ansible.windows.win_powershell:
    script: |
      $cs  = Get-WmiObject Win32_ComputerSystem
      $os  = Get-WmiObject Win32_OperatingSystem
      $disk = Get-WmiObject Win32_LogicalDisk -Filter "DeviceID='C:'"
      $freeGB = [math]::Round($disk.FreeSpace / 1GB, 1)
      $totalGB = [math]::Round($disk.Size / 1GB, 1)

      Write-Output "=== Member Server Role Applied ==="
      Write-Output "  Host      : $($cs.Name)"
      Write-Output "  OS        : $($os.Caption) ($($os.Version))"
      Write-Output "  Domain    : $($cs.Domain)"
      Write-Output "  Disk C:   : $freeGB GB free of $totalGB GB"
      Write-Output "  RAM       : $([math]::Round($cs.TotalPhysicalMemory/1GB,1)) GB"
      Write-Output "  WinRM     : $(if ((Get-Service WinRM).Status -eq 'Running') {'Running'} else {'STOPPED'})"
  register: server_summary

- name: Show member server summary
  debug:
    var: server_summary.output
