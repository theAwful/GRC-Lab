dc_primary_ip:      10.10.10.10
dc_secondary_ip:    10.10.10.11

# ─── Network ──────────────────────────────────────────────────────────────────
dns_servers:
  - 10.10.10.10
  - 10.10.10.11

# ─── OU Paths ─────────────────────────────────────────────────────────────────
ou_servers:       "OU=Servers,DC=corp,DC=grclab,DC=local"
ou_workstations:  "OU=Workstations,DC=corp,DC=grclab,DC=local"
ou_users:         "OU=Users,DC=corp,DC=grclab,DC=local"
ou_service_accts: "OU=ServiceAccounts,DC=corp,DC=grclab,DC=local"
ou_groups:        "OU=Groups,DC=corp,DC=grclab,DC=local"

# ─── Misconfiguration Flags – set false to disable a finding ──────────────────
