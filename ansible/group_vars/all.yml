mc_002_stale_accounts:           true
mc_003_domain_users_local_admin: true
mc_004_smbv1_enabled:            true
mc_005_audit_policy_disabled:    true
mc_007_null_sessions:            true
mc_009_svc_noexpire:             true

# ─── Test Users ───────────────────────────────────────────────────────────────
test_users:
